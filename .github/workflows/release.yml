name: Release

on:
  push:
    tags: ["v*"]

jobs:
  cross-compile:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release --target ${{ matrix.target }}
        working-directory: crates/delve-core
      - uses: actions/upload-artifact@v4
        with:
          name: delve-core-${{ matrix.target }}
          path: crates/delve-core/target/${{ matrix.target }}/release/delve-core${{ runner.os == 'Windows' && '.exe' || '' }}
