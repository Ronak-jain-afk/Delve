name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  cross-compile:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cross-compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Set cross-compiler (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - run: cargo build --release --target ${{ matrix.target }}
        working-directory: crates/delve-core

      - name: Package binary
        shell: bash
        run: |
          EXT=""
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            EXT=".exe"
          fi
          SRC="target/${{ matrix.target }}/release/glimpse${EXT}"
          DST="glimpse-${{ matrix.target }}${EXT}"
          cp "$SRC" "$DST"
          sha256sum "$DST" > "${DST}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: glimpse-${{ matrix.target }}
          path: glimpse-${{ matrix.target }}*
          if-no-files-found: error

  create-release:
    needs: cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: glimpse-*
          merge-multiple: true

      - run: ls -la

      - uses: softprops/action-gh-release@v2
        with:
          files: glimpse-*
          generate_release_notes: true

  publish-npm:
    needs: cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: glimpse-*
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish platform packages
        run: |
          for dir in packages/cli-darwin-x64 packages/cli-darwin-arm64 packages/cli-linux-x64 packages/cli-linux-arm64 packages/cli-win32-x64 packages/cli-win32-arm64; do
            echo "Publishing $dir..."
            cd "$dir"
            npm publish --access public --provenance
            cd -
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public --provenance
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
